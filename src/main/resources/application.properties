spring.application.name=fuel

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

whatsapp.verify-token=${WHATSAPP_VERIFY_TOKEN:dev_verify_token}
whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:dev_access_token}
whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:dev_phone_number_id}
app.public-base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}

server.port=${PORT:8080}